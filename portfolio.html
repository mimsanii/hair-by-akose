<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="View Hair by Akose's portfolio of beautiful braids, twists, weaves, and natural hair transformations.">
<title>Portfolio | Hair by Akose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ── TOKENS ── */
:root{
  --teal:#0F3D3E;--teal-light:#1A6466;
  --black:#071E1E;--black-soft:#0A2828;--black-card:#0D3030;--black-edge:#113838;
  --gold:#D4A96A;--gold-light:#E2C08A;--gold-dark:#B8894E;
  --white:#F5EDD8;--white-dim:rgba(245,237,216,0.6);
  --grad-gold:linear-gradient(135deg,#B8894E 0%,#D4A96A 40%,#E2C08A 60%,#D4A96A 100%);
  --font-display:'Syne',sans-serif;--font-body:'Cormorant Garamond',serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-body);background:var(--black);color:var(--white);line-height:1.75;overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit;transition:all .3s ease}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.22}
.container{width:100%;max-width:1400px;margin:0 auto;padding:0 2rem}
#scroll-progress{position:fixed;top:0;left:0;height:3px;background:var(--grad-gold);z-index:10000;width:0;transition:width .08s linear;pointer-events:none}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.5rem 0;transition:all .4s ease}
.nav.scrolled{background:rgba(7,30,30,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,169,106,.2);padding:1rem 0}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center}
.nav-logo img{height:55px;width:auto;object-fit:contain}
.nav-links{display:flex;list-style:none;gap:2.5rem;align-items:center}
.nav-links a{font-family:var(--font-display);font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--white-dim)}
.nav-links a:hover,.nav-links a.active-link{color:var(--gold)}
.nav-links .nav-cta{padding:.6rem 1.5rem;border:1px solid var(--gold);color:var(--gold);border-radius:100px}
.nav-links .nav-cta:hover{background:var(--gold);color:var(--black)}

/* ── HAMBURGER — glass pill (matches index.html) ── */
.hamburger{
  display:none;flex-direction:column;gap:6px;cursor:pointer;
  z-index:1100;position:relative;padding:.55rem .7rem;
  background:rgba(245,237,216,.06);border:1px solid rgba(212,169,106,.25);
  border-radius:10px;backdrop-filter:blur(8px);
  transition:background .25s,border-color .25s;
}
.hamburger:hover{background:rgba(212,169,106,.12);border-color:rgba(212,169,106,.5)}
.hamburger span{display:block;height:1.5px;background:var(--white);border-radius:2px;transition:all .38s var(--ease)}
.hamburger span:nth-child(1){width:22px}
.hamburger span:nth-child(2){width:16px;margin-left:auto;background:var(--gold)}
.hamburger span:nth-child(3){width:22px}
.hamburger.open{background:rgba(212,169,106,.15);border-color:rgba(212,169,106,.5)}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(0,5.5px);width:20px}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(0,-5.5px);width:20px}

/* ── SLIDE PANEL — same as index.html ── */
.mob-menu-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(7,30,30,.55);backdrop-filter:blur(3px);
  z-index:1070;opacity:0;transition:opacity .35s ease;
}
.mob-menu-backdrop.open{display:block;opacity:1}
.mob-menu{
  display:flex;flex-direction:column;justify-content:center;
  position:fixed;top:0;right:0;bottom:0;
  width:68%;max-width:300px;
  background:rgba(7,30,30,.72);
  backdrop-filter:blur(22px) saturate(1.6);
  -webkit-backdrop-filter:blur(22px) saturate(1.6);
  border-left:1px solid rgba(212,169,106,.22);
  z-index:1080;padding:5.5rem 1.6rem 4rem 1.5rem;
  transform:translateX(100%);
  transition:transform .4s var(--ease);
  pointer-events:none;overflow-y:auto;
}
.mob-menu.open{transform:translateX(0);pointer-events:auto}
.mob-menu-close{
  position:absolute;top:1rem;right:1rem;width:34px;height:34px;
  background:rgba(212,169,106,.08);border:1px solid rgba(212,169,106,.22);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:rgba(212,169,106,.7);font-size:.85rem;cursor:pointer;transition:all .2s;
}
.mob-menu-close:hover{background:rgba(212,169,106,.2);color:var(--gold)}
.mob-menu-brand{
  font-family:var(--font-body);font-size:1.1rem;font-weight:600;font-style:italic;
  letter-spacing:.04em;color:var(--gold);margin-bottom:2rem;padding-bottom:1rem;
  border-bottom:1px solid rgba(212,169,106,.25);
}
.mob-menu-links{display:flex;flex-direction:column;width:100%}
.mob-menu-links::before{content:'';display:block;height:1px;background:linear-gradient(90deg,rgba(212,169,106,.35),rgba(212,169,106,.08))}
.mob-menu-links a{
  font-family:var(--font-body);font-size:1.6rem;font-weight:600;
  color:rgba(245,237,216,.78);letter-spacing:.01em;padding:.75rem 0;
  border-bottom:1px solid;border-image:linear-gradient(90deg,rgba(212,169,106,.35),rgba(212,169,106,.06)) 1;
  display:flex;align-items:center;justify-content:space-between;
  transition:color .22s,letter-spacing .22s;
}
.mob-menu-links a.active-link{color:var(--gold)}
.mob-menu-links a::after{
  content:'↗';font-family:var(--font-display);font-size:.7rem;font-style:normal;
  color:rgba(212,169,106,.3);transition:color .22s,transform .22s;flex-shrink:0;margin-left:.5rem;
}
.mob-menu-links a:hover::after,.mob-menu-links a:active::after{color:var(--gold);transform:translate(3px,-3px)}
.mob-menu-links a:hover,.mob-menu-links a:active{color:#F5EDD8;letter-spacing:.04em}
.mob-menu-cta{
  margin-top:1.75rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.85rem 1.2rem;background:var(--grad-gold);color:#071E1E;
  font-family:var(--font-display);font-size:.68rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
}
.mob-menu-socials{display:flex;gap:.6rem;margin-top:1.5rem}
.mob-menu-socials a{
  width:32px;height:32px;background:rgba(245,237,216,.04);
  border:1px solid rgba(212,169,106,.18);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:.82rem;color:rgba(245,237,216,.4);transition:all .2s;
}
.mob-menu-socials a:hover{background:rgba(212,169,106,.12);color:var(--gold);border-color:rgba(212,169,106,.5)}
.mob-menu-meta{
  margin-top:1.1rem;font-family:var(--font-body);font-style:italic;
  font-size:.82rem;letter-spacing:.03em;color:rgba(245,237,216,.25);line-height:1.8;
}

/* ── PAGE HERO ── */
.page-hero{
  min-height:52vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:10rem 2rem 4rem;position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);
  width:70vw;height:70vw;
  background:radial-gradient(ellipse,rgba(212,169,106,.1) 0%,transparent 65%);
  pointer-events:none;
}
.hero-lines{position:absolute;inset:0;pointer-events:none}
.hero-lines span{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(212,169,106,.1),transparent)}
.hero-lines span:nth-child(1){left:20%}.hero-lines span:nth-child(2){left:40%}
.hero-lines span:nth-child(3){left:60%}.hero-lines span:nth-child(4){left:80%}
.hero-inner{position:relative;z-index:2;animation:fadeUp .9s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.75rem;
  font-family:var(--font-display);font-size:.7rem;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:40px;height:1px;background:var(--gold);opacity:.5}
.page-title{
  font-family:var(--font-display);font-size:clamp(3.5rem,10vw,8rem);
  font-weight:800;line-height:.95;letter-spacing:-.03em;margin-bottom:1.25rem;
  color:var(--white);
}
.page-title span{
  display:block;background:var(--grad-gold);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-style:italic;
}
.page-subtitle{font-size:clamp(1rem,2vw,1.25rem);color:var(--white-dim);font-style:italic;max-width:520px;margin:0 auto}

/* ── FILTER BAR ── */
.filter-section{
  padding:2rem 0;background:var(--black-soft);
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(212,169,106,.1);
  backdrop-filter:blur(10px);
}
.filter-buttons{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap}
.filter-btn{
  padding:.55rem 1.35rem;font-family:var(--font-display);font-size:.72rem;
  font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:transparent;color:var(--white-dim);
  border:1px solid rgba(212,169,106,.2);border-radius:100px;
  cursor:pointer;transition:all .3s ease;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--grad-gold);color:var(--black);border-color:transparent;box-shadow:0 4px 20px rgba(212,169,106,.3)}

/* ── GALLERY ── */
.portfolio-gallery{padding:5rem 0 6rem;background:var(--black)}
.gallery-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1.25rem}
.gallery-item{grid-column:span 4}
.gallery-item.large{grid-column:span 6}
.gallery-item.wide{grid-column:span 8}
.gallery-item.tall{grid-column:span 3}
.gallery-card{
  position:relative;border-radius:14px;overflow:hidden;cursor:pointer;
  background:var(--black-card);border:1px solid rgba(212,169,106,.08);
  transition:all .4s var(--ease);height:100%;min-height:280px;
}
.gallery-item.large .gallery-card{min-height:380px}
.gallery-item.wide  .gallery-card{min-height:260px}
.gallery-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s var(--ease);position:absolute;inset:0}
.gallery-card:hover img{transform:scale(1.07)}
.gallery-card:hover{border-color:rgba(212,169,106,.3);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.gallery-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(7,30,30,.92) 0%,rgba(7,30,30,.3) 50%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:1.75rem;
  opacity:0;transition:opacity .4s ease;
}
.gallery-card:hover .gallery-overlay{opacity:1}
.gallery-overlay h3{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--white);margin-bottom:.3rem}
.gallery-overlay p{font-family:var(--font-display);font-size:.72rem;letter-spacing:.1em;color:var(--gold-light);text-transform:uppercase;margin-bottom:1rem}
.zoom-btn{
  width:38px;height:38px;border-radius:50%;background:var(--grad-gold);border:none;
  color:var(--black);display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;transition:all .3s ease;align-self:flex-start;
}
.zoom-btn:hover{transform:scale(1.15)}
.gallery-tag{
  position:absolute;top:1rem;left:1rem;
  background:rgba(7,30,30,.8);border:1px solid rgba(212,169,106,.3);
  border-radius:100px;padding:.28rem .8rem;
  font-family:var(--font-display);font-size:.62rem;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;color:var(--gold);
  backdrop-filter:blur(8px);z-index:2;
}
.gallery-item.hidden{display:none}
.gallery-item.extra .gallery-card{min-height:280px}
.load-more-wrap{text-align:center;margin-top:3.5rem}
.btn-ghost-gold{
  display:inline-flex;align-items:center;gap:.6rem;padding:1rem 2.5rem;
  background:transparent;color:var(--gold);font-family:var(--font-display);
  font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid rgba(212,169,106,.4);border-radius:100px;cursor:pointer;transition:all .3s ease;
}
.btn-ghost-gold:hover{background:var(--grad-gold);color:var(--black);border-color:transparent;box-shadow:0 8px 30px rgba(212,169,106,.3)}

/* ── LIGHTBOX ── */
.lightbox{
  position:fixed;inset:0;background:rgba(7,30,30,.97);
  backdrop-filter:blur(20px);z-index:2000;
  display:none;align-items:center;justify-content:center;padding:2rem;
}
.lightbox.open{display:flex;animation:lbFade .3s ease}
@keyframes lbFade{from{opacity:0}to{opacity:1}}
.lightbox-inner{position:relative;max-width:900px;width:100%}
.lightbox-inner img{width:100%;border-radius:16px;border:1px solid rgba(212,169,106,.2);box-shadow:0 40px 100px rgba(0,0,0,.8);max-height:85vh;object-fit:contain}
.lightbox-close{position:absolute;top:-1rem;right:-1rem;width:44px;height:44px;border-radius:50%;background:var(--grad-gold);border:none;color:var(--black);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.lightbox-close:hover{transform:scale(1.1)}
.lightbox-caption{text-align:center;margin-top:1.25rem}
.lightbox-caption h3{font-family:var(--font-display);font-size:1.25rem;color:var(--white)}
.lightbox-caption p{font-family:var(--font-display);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-top:.3rem}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(7,30,30,.8);border:1px solid rgba(212,169,106,.3);color:var(--gold);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.lightbox-nav:hover{background:var(--grad-gold);color:var(--black);border-color:transparent}
.lightbox-prev{left:-3.5rem}.lightbox-next{right:-3.5rem}

/* ── CTA ── */
.cta{padding:8rem 0;background:var(--black-soft);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60vw;height:60vw;background:radial-gradient(ellipse,rgba(212,169,106,.08) 0%,transparent 65%);pointer-events:none}
.cta-inner{text-align:center;max-width:700px;margin:0 auto;position:relative;z-index:2}
.cta-title{font-family:var(--font-display);font-size:clamp(2rem,5vw,4rem);font-weight:800;color:var(--white);margin-bottom:1rem}
.cta-text{font-size:1.2rem;color:var(--white-dim);font-style:italic;margin-bottom:3rem}
.cta-btns{display:flex;gap:1.25rem;justify-content:center;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:1rem 2.5rem;background:var(--grad-gold);color:var(--black);font-family:var(--font-display);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:100px;transition:all .3s;box-shadow:0 0 30px rgba(212,169,106,.25)}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(212,169,106,.4)}
.btn-whatsapp{display:inline-flex;align-items:center;gap:.75rem;padding:1rem 2.5rem;background:#25D366;color:white;font-family:var(--font-display);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:100px;transition:all .3s}
.btn-whatsapp:hover{background:#1DAD52;transform:translateY(-3px)}

/* ── FOOTER ── */
.footer{background:var(--black-soft);border-top:1px solid rgba(212,169,106,.18);padding:5rem 0 2.5rem}
.footer-grid{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:3rem;margin-bottom:4rem}
.footer-brand img{height:70px;width:auto;object-fit:contain;margin-bottom:1.25rem}
.footer-brand p{font-size:1rem;color:var(--white-dim);line-height:1.7;margin-bottom:1.5rem}
.socials{display:flex;gap:.75rem}
.socials a{width:42px;height:42px;border-radius:50%;background:var(--black-card);border:1px solid rgba(212,169,106,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--white-dim);transition:all .3s}
.socials a:hover{background:var(--gold);color:var(--black);border-color:var(--gold);transform:translateY(-3px)}
.footer-col h4{font-family:var(--font-display);font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:.7rem;font-size:.95rem;color:var(--white-dim)}
.footer-col ul li i{color:var(--gold);width:16px;margin-right:.5rem}
.footer-col ul li a{color:inherit}
.footer-col ul li a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(212,169,106,.1);padding-top:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;font-size:.85rem;color:rgba(245,237,216,.3);font-family:var(--font-display)}

/* ── TABLET ≤ 1024px ── */
@media(max-width:1024px){
  .gallery-item{grid-column:span 6}
  .gallery-item.large{grid-column:span 6}
  .gallery-item.wide{grid-column:span 12}
  .footer-grid{grid-template-columns:1fr 1fr;gap:2.5rem}
  .footer-brand{grid-column:span 2}
  .lightbox-prev{left:-.5rem}.lightbox-next{right:-.5rem}
}

/* ═══════════════════════════════════
   MOBILE ≤ 767px  —  BOLD SPLIT STYLE
═══════════════════════════════════ */
@media(max-width:767px){
  html{font-size:15px}
  body{padding-bottom:4.75rem}
  .container{padding:0 1rem}

  /* NAV */
  .nav{padding:.85rem 0;background:rgba(7,30,30,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,169,106,.14)}
  .nav-inner{padding:0 1rem}
  .nav-logo img{height:40px}
  .nav-links{display:none!important}
  .hamburger{display:flex}

  /* PAGE HERO — compact split-style header */
  .page-hero{
    min-height:auto;padding:0;
    display:grid;grid-template-columns:38% 62%;
    align-items:stretch;
  }
  .page-hero::before{display:none}
  .hero-lines{display:none}
  .hero-inner{
    grid-column:1 / span 2;
    display:grid;grid-template-columns:38% 62%;
    align-items:stretch;
  }

  /* LEFT: gold block with category label */
  .hero-gold-side{
    background:var(--gold);
    display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;
    padding:5.5rem .65rem 1.5rem;
    position:relative;overflow:hidden;
  }
  .hero-gold-side::before{
    content:'P';position:absolute;bottom:-1.5rem;left:50%;
    transform:translateX(-50%);
    font-family:var(--font-display);font-size:11rem;font-weight:800;
    color:rgba(7,30,30,.11);line-height:1;pointer-events:none;
  }
  .hero-gold-side .brand-vert{
    font-family:var(--font-display);font-size:.48rem;font-weight:800;
    letter-spacing:.18em;text-transform:uppercase;color:var(--black);
    writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);opacity:.7;
  }
  .hero-gold-side .count-tag{
    background:var(--black);color:var(--gold);
    font-family:var(--font-display);font-size:.5rem;font-weight:700;
    letter-spacing:.15em;text-transform:uppercase;
    padding:.4rem .5rem;width:100%;text-align:center;
  }

  /* RIGHT: dark block with title */
  .hero-dark-side{
    background:var(--black-soft);
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:5.5rem 1rem 1.5rem;
  }
  .hero-eyebrow{font-size:.54rem;letter-spacing:.16em;margin-bottom:.7rem;justify-content:flex-start}
  .hero-eyebrow::before{width:12px}
  .hero-eyebrow::after{display:none}
  .page-title{
    font-size:clamp(2rem,9vw,3rem);
    line-height:.92;letter-spacing:-.04em;margin-bottom:.8rem;color:var(--white);
  }
  .page-title span{font-size:clamp(1.8rem,8.5vw,2.8rem)}

.gallery-item:nth-child(n+13){aspect-ratio:3/4}
